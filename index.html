    const playSound = (type = 'click') => {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);

        if (type === 'click') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(800, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.05);
          gain.gain.setValueAtTime(0.15, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.05);
          osc.start();
          osc.stop(ctx.currentTime + 0.05);
        } else if (type === 'success') {
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(523.25, ctx.currentTime);
          osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.08);
          osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.16);
          gain.gain.setValueAtTime(0.2, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
          osc.start();
          osc.stop(ctx.currentTime + 0.3);
        }
      } catch (e) {}
    };

    const getLogoRasterEscPos = () => {
      return new Promise((resolve) => {
        const img = new Image();
        img.crossOrigin = "Anonymous";
        img.src = STORE_INFO.logo;
        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            const targetWidth = 160; // 160 px wide logo for 58mm printer
            const scale = targetWidth / img.width;
            const targetHeight = Math.round(img.height * scale);

            canvas.width = targetWidth;
            canvas.height = targetHeight;
            const ctx = canvas.getContext("2d");
            ctx.fillStyle = "#FFFFFF";
            ctx.fillRect(0, 0, targetWidth, targetHeight);
            ctx.drawImage(img, 0, 0, targetWidth, targetHeight);

            const imgData = ctx.getImageData(0, 0, targetWidth, targetHeight);
            const widthBytes = Math.ceil(targetWidth / 8);
            const rasterData = [];

            // ESC/POS GS v 0 command header
            // 0x1D, 0x76, 0x30, mode (0), xL, xH, yL, yH
            const xL = widthBytes % 256;
            const xH = Math.floor(widthBytes / 256);
            const yL = targetHeight % 256;
            const yH = Math.floor(targetHeight / 256);

            rasterData.push(0x1D, 0x76, 0x30, 0, xL, xH, yL, yH);

            for (let y = 0; y < targetHeight; y++) {
              for (let b = 0; b < widthBytes; b++) {
                let byteVal = 0;
                for (let bit = 0; bit < 8; bit++) {
                  const x = b * 8 + bit;
                  if (x < targetWidth) {
                    const idx = (y * targetWidth + x) * 4;
                    const r = imgData.data[idx];
                    const g = imgData.data[idx + 1];
                    const bVal = imgData.data[idx + 2];
                    const brightness = (r * 0.299 + g * 0.587 + bVal * 0.114);
                    // Dark pixel = 1
                    if (brightness < 128) {
                      byteVal |= (1 << (7 - bit));
                    }
                  }
                }
                rasterData.push(byteVal);
              }
            }
            resolve(new Uint8Array(rasterData));
          } catch (e) {
            resolve(null);
          }
        };
        img.onerror = () => resolve(null);
      });
    };

    function App() {
      // Navigation state: 'kasir' | 'riwayat' | 'analisis' | 'pengaturan'
      const [activeTab, setActiveTab] = useState('kasir'); 
      const [cart, setCart] = useState([]);
      const [selectedCategory, setSelectedCategory] = useState("Semua");
      const [searchTerm, setSearchTerm] = useState("");
      const [soundEnabled, setSoundEnabled] = useState(true);

      // Custom Alert / Confirm Modal State
      const [customAlert, setCustomAlert] = useState({
        show: false,
        title: "",
        message: "",
        type: "info",
        onConfirm: null
      });

      const showAlert = (title, message) => {
        setCustomAlert({ show: true, title, message, type: "info", onConfirm: null });
      };

      const showConfirm = (title, message, onConfirm) => {
        setCustomAlert({ show: true, title, message, type: "confirm", onConfirm });
      };

      const closeAlert = () => {
        setCustomAlert(prev => ({ ...prev, show: false }));
      };

      // Menu List dengan LocalStorage persistence
      const [menuList, setMenuList] = useState(() => {
        try {
          const savedMenu = localStorage.getItem('izzi_pos_menu_v5');
          return savedMenu ? JSON.parse(savedMenu) : INITIAL_MENU;
        } catch(e) {
          return INITIAL_MENU;
        }
      });

      useEffect(() => {
        try {
          localStorage.setItem('izzi_pos_menu_v5', JSON.stringify(menuList));
        } catch(e){}
      }, [menuList]);

      // Delivery Option State ('loby' = Rp 0, 'unit' = Rp 2000)
      const [deliveryOption, setDeliveryOption] = useState('loby');
      const deliveryFee = deliveryOption === 'unit' ? 2000 : 0;

      // Custom / Edit Item Modal State
      const [showAddMenuModal, setShowAddMenuModal] = useState(false);
      const [editingItemCatalog, setEditingItemCatalog] = useState(null); // Item yang sedang diedit di katalog
      const [customName, setCustomName] = useState("");
      const [customPrice, setCustomPrice] = useState("");
      const [customQty, setCustomQty] = useState("1");
      const [customCategory, setCustomCategory] = useState("Ayam & Nasi");
      const [saveToCatalog, setSaveToCatalog] = useState(true);

      // Quick Cart Item Edit State
      const [editingCartItem, setEditingCartItem] = useState(null);
      const [editCartPrice, setEditCartPrice] = useState("");

      // Payment Modal States
      const [showPaymentModal, setShowPaymentModal] = useState(false);
      const [paymentMethod, setPaymentMethod] = useState("Tunai"); 
      const [cashPaid, setCashPaid] = useState("");
      
      // Thermal Bluetooth Printer States
      const [autoPrintEnabled, setAutoPrintEnabled] = useState(false);
      const [showReceiptModal, setShowReceiptModal] = useState(false);
      const [currentTransaction, setCurrentTransaction] = useState(null);
      const [btDevice, setBtDevice] = useState(null);
      const [btConnected, setBtConnected] = useState(false);
      const [btStatusText, setBtStatusText] = useState("Bluetooth Terputus");
      const [printerDeviceName, setPrinterDeviceName] = useState("");

      // History Transaksi
      const [history, setHistory] = useState(() => {
        try {
          const saved = localStorage.getItem('izzi_pos_history');
          return saved ? JSON.parse(saved) : [];
        } catch(e) {
          return [];
        }
      });

      useEffect(() => {
        try {
          localStorage.setItem('izzi_pos_history', JSON.stringify(history));
        } catch(e){}
      }, [history]);

      const filteredMenu = useMemo(() => {
        return menuList.filter(item => {
          const matchCat = selectedCategory === "Semua" || item.category === selectedCategory;
          const matchSearch = item.name.toLowerCase().includes(searchTerm.toLowerCase());
          return matchCat && matchSearch;
        });
      }, [menuList, selectedCategory, searchTerm]);

      const itemsSubtotal = useMemo(() => cart.reduce((acc, curr) => acc + (curr.price * curr.qty), 0), [cart]);
      const cartTotal = useMemo(() => itemsSubtotal + deliveryFee, [itemsSubtotal, deliveryFee]);
      const cartTotalQty = useMemo(() => cart.reduce((acc, curr) => acc + curr.qty, 0), [cart]);

      // Analytics Summaries
      const analyticsSummary = useMemo(() => {
        const totalSales = history.reduce((acc, curr) => acc + curr.total, 0);
        const totalOrders = history.length;
        const avgOrder = totalOrders > 0 ? Math.round(totalSales / totalOrders) : 0;

        const itemCounts = {};
        history.forEach(tx => {
          tx.items.forEach(it => {
            itemCounts[it.name] = (itemCounts[it.name] || 0) + it.qty;
          });
        });

        let topItem = "-";
        let topCount = 0;
        Object.keys(itemCounts).forEach(name => {
          if (itemCounts[name] > topCount) {
            topCount = itemCounts[name];
            topItem = name;
          }
        });

        return { totalSales, totalOrders, avgOrder, topItem, topCount };
      }, [history]);

      const addToCart = (product) => {
        if (soundEnabled) playSound('click');
        setCart(prev => {
          const existing = prev.find(item => item.id === product.id);
          if (existing) {
            return prev.map(item => item.id === product.id ? { ...item, qty: item.qty + 1 } : item);
          } else {
            return [...prev, { ...product, qty: 1, note: "" }];
          }
        });
      };

      // Open Modal Edit Menu dari Katalog
      const openEditCatalogModal = (item) => {
        setEditingItemCatalog(item);
        setCustomName(item.name);
        setCustomPrice(item.price.toString());
        setCustomCategory(item.category);
        setShowAddMenuModal(true);
      };

      // Modal Simpan Menu Baru ATAU Edit Menu
      const handleSaveCatalogOrCustom = (e) => {
        e.preventDefault();
        if (!customName.trim() || !customPrice || isNaN(customPrice) || parseFloat(customPrice) < 0) {
          showAlert("Input Tidak Valid", "Mohon masukkan nama menu dan harga angka yang sesuai.");
          return;
        }

        const priceNum = parseFloat(customPrice);

        // Jika mode EDIT menu dari katalog
        if (editingItemCatalog) {
          setMenuList(prev => prev.map(item => {
            if (item.id === editingItemCatalog.id) {
              return {
                ...item,
                name: customName.trim(),
                price: priceNum,
                category: customCategory
              };
            }
            return item;
          }));

          // Juga update jika item ada di keranjang
          setCart(prev => prev.map(c => c.id === editingItemCatalog.id ? { ...c, price: priceNum, name: customName.trim() } : c));

          showAlert("Harga & Menu Diperbarui", `Menu ${customName} berhasil diperbarui harganya.`);
        } else {
          // Jika mode Tambah Custom Menu Baru
          const qtyNum = parseInt(customQty) || 1;
          const newId = Date.now();

          const newItem = {
            id: newId,
            name: customName.trim(),
            price: priceNum,
            category: customCategory,
            icon: "⭐",
            desc: "Menu manual / khusus"
          };

          if (saveToCatalog) {
            setMenuList(prev => [newItem, ...prev]);
          }

          setCart(prev => {
            const existing = prev.find(i => i.name.toLowerCase() === newItem.name.toLowerCase());
            if (existing) {
              return prev.map(i => i.name.toLowerCase() === newItem.name.toLowerCase() ? { ...i, qty: i.qty + qtyNum } : i);
            }
            return [...prev, { ...newItem, qty: qtyNum, note: "" }];
          });
        }

        if (soundEnabled) playSound('click');
        resetMenuForm();
      };

      const resetMenuForm = () => {
        setEditingItemCatalog(null);
        setCustomName("");
        setCustomPrice("");
        setCustomQty("1");
        setShowAddMenuModal(false);
      };

      // Modal Quick Edit Harga di Keranjang
      const openEditCartPrice = (item) => {
        setEditingCartItem(item);
        setEditCartPrice(item.price.toString());
      };

      const handleSaveCartPrice = (e) => {
        e.preventDefault();
        const priceNum = parseFloat(editCartPrice);
        if (isNaN(priceNum) || priceNum < 0) {
          showAlert("Harga Salah", "Masukkan besaran harga yang valid.");
          return;
        }

        setCart(prev => prev.map(i => i.id === editingCartItem.id ? { ...i, price: priceNum } : i));
        setEditingCartItem(null);
        if (soundEnabled) playSound('click');
      };

      const handleDeleteMenuItem = (id) => {
        showConfirm("Hapus Menu?", "Apakah Anda yakin ingin menghapus menu ini dari katalog?", () => {
          setMenuList(prev => prev.filter(m => m.id !== id));
        });
      };

      const resetCatalogMenu = () => {
        showConfirm(
          "Reset Daftar Menu?", 
          "Semua menu yang Anda ubah/tambah manual akan kembali ke daftar awal iZZi Corner.", 
          () => setMenuList(INITIAL_MENU)
        );
      };

      const updateQty = (id, delta) => {
        if (soundEnabled) playSound('click');
        setCart(prev => {
          return prev.map(item => {
            if (item.id === id) {
              const newQty = item.qty + delta;
              return newQty > 0 ? { ...item, qty: newQty } : null;
            }
            return item;
          }).filter(Boolean);
        });
      };

      const updateNote = (id, note) => {
        setCart(prev => prev.map(item => item.id === id ? { ...item, note } : item));
      };

      const clearCart = () => setCart([]);

      const handleOpenPayment = () => {
        if (cart.length === 0) return;
        setCashPaid(cartTotal.toString());
        setShowPaymentModal(true);
      };

      const processPayment = () => {
        const numericPaid = parseFloat(cashPaid) || cartTotal;
        const change = numericPaid - cartTotal;

        if (paymentMethod === "Tunai" && change < 0) {
          showAlert("Uang Kurang", "Uang tunai yang dimasukkan masih kurang dari total tagihan.");
          return;
        }

        const newTx = {
          id: "IZZI-" + Date.now().toString().slice(-6),
          date: new Date().toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' }),
          items: [...cart],
          itemsSubtotal: itemsSubtotal,
          deliveryFee: deliveryFee,
          deliveryOption: deliveryOption,
          total: cartTotal,
          paymentMethod: paymentMethod,
          paid: paymentMethod === "Tunai" ? numericPaid : cartTotal,
          change: paymentMethod === "Tunai" ? Math.max(0, change) : 0,
        };

        if (soundEnabled) playSound('success');
        setHistory(prev => [newTx, ...prev]);
        setCurrentTransaction(newTx);
        setShowPaymentModal(false);
        setCart([]);

        if (autoPrintEnabled && btConnected) {
          printReceiptThermal(newTx);
        }
        
        setShowReceiptModal(true);
      };

      const connectBluetoothPrinter = async () => {
        try {
          if (!navigator.bluetooth) {
            showAlert("Tidak Didukung", "Browser Anda belum mendukung Web Bluetooth. Gunakan Google Chrome pada perangkat Android.");
            return;
          }
          
          setBtStatusText("Mencari printer...");
          const device = await navigator.bluetooth.requestDevice({
            acceptAllDevices: true,
            optionalServices: [
              '000018f0-0000-1000-8000-00805f9b34fb',
              '00001101-0000-1000-8000-00805f9b34fb',
              'e7810a71-73ae-499d-8c15-faa9aef0c3f2'
            ]
          });

          setPrinterDeviceName(device.name || "Printer Thermal 58mm");
          setBtDevice(device);
          setBtConnected(true);
          setBtStatusText(`Terhubung: ${device.name || "Printer 58mm"}`);
          showAlert("Berhasil Terhubung", `Terhubung dengan printer: ${device.name || "Bluetooth Thermal"}`);
        } catch (error) {
          console.error("BT Error:", error);
          setBtStatusText("Sambungan dibatalkan");
          setBtConnected(false);
        }
      };

      const format58mmLine = (leftStr, rightStr) => {
        const MAX_CHARS = 32;
        const left = leftStr.substring(0, MAX_CHARS - rightStr.length - 1);
        const spaces = MAX_CHARS - (left.length + rightStr.length);
        return left + " ".repeat(Math.max(1, spaces)) + rightStr;
      };

      const generateEscPosData = async (tx) => {
        let commands = [];
        const encoder = new TextEncoder();

        const addText = (str) => commands.push(...encoder.encode(str + "\n"));
        const addCmd = (cmdArr) => commands.push(...cmdArr);

        // Reset Printer ESC @
        addCmd([0x1B, 0x40]); 
        
        // Cetak Logo Raster jika tersedia
        try {
          const logoRasterBytes = await getLogoRasterEscPos();
          if (logoRasterBytes) {
            addCmd([0x1B, 0x61, 0x01]); // Align Center
            addCmd(Array.from(logoRasterBytes));
            addText("");
          }
        } catch (e) {
          console.log("Logo raster skipped:", e);
        }

        // Header Text
        addCmd([0x1B, 0x61, 0x01]); // Center align
        addCmd([0x1B, 0x45, 0x01]); // Bold ON
        addText(STORE_INFO.name.toUpperCase());
        addCmd([0x1B, 0x45, 0x00]); // Bold OFF
        addText(STORE_INFO.slogan);
        addText(STORE_INFO.address);
        addText("WA: " + STORE_INFO.whatsapp);
        addText("--------------------------------");

        // Transaction Info
        addCmd([0x1B, 0x61, 0x00]); // Left align
        addText(`No : ${tx.id}`);
        addText(`Tgl: ${tx.date}`);
        addText(`Bayar: ${tx.paymentMethod}`);
        addText("--------------------------------");

        // Items
        tx.items.forEach(item => {
          addText(item.name);
          if (item.note) addText(`  * ${item.note}`);
          const qtyPrice = `${item.qty} x ${item.price.toLocaleString('id-ID')}`;
          const totalItem = (item.qty * item.price).toLocaleString('id-ID');
          addText(format58mmLine(` ${qtyPrice}`, totalItem));
        });

        addText("--------------------------------");
        if (tx.deliveryFee > 0) {
          addText(format58mmLine("Subtotal Pesanan:", `Rp ${(tx.itemsSubtotal || tx.total - tx.deliveryFee).toLocaleString('id-ID')}`));
          addText(format58mmLine("Ongkir Delivery Unit:", `Rp ${tx.deliveryFee.toLocaleString('id-ID')}`));
        } else {
          addText(format58mmLine("Ongkir (Loby/Sec):", "GRATIS"));
        }
        addText(format58mmLine("TOTAL TAGIHAN:", `Rp ${tx.total.toLocaleString('id-ID')}`));
        
        if (tx.paymentMethod === "Tunai") {
          addText(format58mmLine("Uang Tunai:", `Rp ${tx.paid.toLocaleString('id-ID')}`));
          addText(format58mmLine("Kembalian:", `Rp ${tx.change.toLocaleString('id-ID')}`));
        }
        addText("--------------------------------");

        // Footer
        addCmd([0x1B, 0x61, 0x01]); // Center align
        addText("Terima Kasih Atas Kunjungannya!");
        addText("Fresh & Delicious Everyday");
        addText("Delivery: WA / Samawa No. 3");
        addText("Available on: Grab/Go/ShopeeFood");
        addText("\n\n\n");

        return new Uint8Array(commands);
      };

      const printReceiptThermal = async (tx = currentTransaction) => {
        if (!tx) return;

        if (btDevice && btConnected) {
          try {
            const server = await btDevice.gatt.connect();
            const services = await server.getPrimaryServices();
            if (services.length > 0) {
              const characteristics = await services[0].getCharacteristics();
              if (characteristics.length > 0) {
                const char = characteristics[0];
                const data = await generateEscPosData(tx);
                
                const CHUNK_SIZE = 512;
                for (let i = 0; i < data.length; i += CHUNK_SIZE) {
                  const chunk = data.slice(i, i + CHUNK_SIZE);
                  await char.writeValue(chunk);
                }
                showAlert("Berhasil Cetak", "Struk + Logo telah dicetak ke printer Bluetooth Thermal.");
                return;
              }
            }
          } catch (e) {
            console.error("Print Error:", e);
            showAlert("Gagal Cetak BT", "Koneksi Bluetooth terputus. Menggunakan dialog cetak bawaan HP/Sistem.");
          }
        }

        window.print();
      };

      const sendWhatsAppReceipt = (tx) => {
        if (!tx) return;
        let text = `*-- STRUK PEMBAYARAN ${STORE_INFO.name.toUpperCase()} --*\n`;
        text += `${STORE_INFO.address}\n`;
        text += `WA: ${STORE_INFO.whatsapp}\n`;
        text += `-----------------------------------\n`;
        text += `No. Transaksi: ${tx.id}\n`;
        text += `Tanggal: ${tx.date}\n`;
        text += `Metode: ${tx.paymentMethod}\n`;
        text += `-----------------------------------\n`;
        tx.items.forEach(i => {
          text += `• ${i.name} (${i.qty}x)\n  Rp ${(i.qty * i.price).toLocaleString('id-ID')}\n`;
          if (i.note) text += `  Catatan: ${i.note}\n`;
        });
        text += `-----------------------------------\n`;
        if (tx.deliveryFee > 0) {
          text += `Subtotal: Rp ${(tx.itemsSubtotal || tx.total - tx.deliveryFee).toLocaleString('id-ID')}\n`;
          text += `Ongkir Unit: Rp ${tx.deliveryFee.toLocaleString('id-ID')}\n`;
        } else {
          text += `Ongkir: GRATIS (Loby/Security)\n`;
        }
        text += `*TOTAL: Rp ${tx.total.toLocaleString('id-ID')}*\n`;
        if (tx.paymentMethod === "Tunai") {
          text += `Bayar: Rp ${tx.paid.toLocaleString('id-ID')}\n`;
          text += `Kembali: Rp ${tx.change.toLocaleString('id-ID')}\n`;

      const exportCSV = () => {

        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);

                  <div className="flex items-center justify-between text-xs py-1 border-b">
                    <span className="text-gray-600">Cetak otomatis saat bayar</span>
                    <label className="relative inline-flex items-center cursor-pointer">
                      <input 
                        type="checkbox" 
                        checked={autoPrintEnabled} 
                        onChange={(e) => setAutoPrintEnabled(e.target.checked)} 
                        className="sr-only peer"
                      />
                      <div className="w-9 h-5 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-emerald-500"></div>
                    </label>
                  </div>

                  <div className="flex items-center justify-between text-xs py-1">
                    <span className="text-gray-600">Suara Tombol / Beep</span>
                    <label className="relative inline-flex items-center cursor-pointer">
                      <input 
                        type="checkbox" 
                        checked={soundEnabled} 
                        onChange={(e) => setSoundEnabled(e.target.checked)} 
                        className="sr-only peer"
                      />
                      <div className="w-9 h-5 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-emerald-500"></div>
                    </label>
                  </div>
                </div>

                {/* EDIT & ATUR HARGA KATALOG MENU */}
                <div className="bg-white p-3 rounded-xl border border-gray-200 shadow-sm space-y-2">
                  <div className="flex items-center justify-between">
                    <h3 className="font-bold text-xs text-gray-800">Atur Harga & Katalog ({menuList.length} item)</h3>
                    <button
                      onClick={() => {
                        setEditingItemCatalog(null);
                        setCustomName("");
                        setCustomPrice("");
                        setShowAddMenuModal(true);
                      }}
                      className="text-xs bg-yellow-400 font-bold px-2 py-1 rounded text-gray-800 hover:bg-yellow-500"
                    >
                      + Menu
                    </button>
                  </div>
                  
                  <div className="max-h-56 overflow-y-auto divide-y divide-gray-100 no-scrollbar pr-1">
                    {menuList.map(m => (
                      <div key={m.id} className="py-2 flex items-center justify-between text-xs">
                        <div>
                          <span className="font-semibold text-gray-800">{m.icon} {m.name}</span>
                          <span className="text-[10px] text-brand-blue font-bold block">
                            Rp {m.price.toLocaleString('id-ID')}
                          </span>
                        </div>
                        <div className="flex items-center space-x-1.5">
                          <button
                            onClick={() => openEditCatalogModal(m)}
                            className="bg-blue-50 text-brand-blue border border-blue-200 font-bold px-2 py-1 rounded text-[11px] hover:bg-blue-100"
                          >
                            ✏️ Edit Harga
                          </button>
                          <button
                            onClick={() => handleDeleteMenuItem(m.id)}
                            className="text-red-500 hover:text-red-700 font-bold text-xs p-1"
                          >
                            Hapus
                          </button>
                        </div>
                      </div>
                    ))}
                  </div>

                  <button
                    onClick={resetCatalogMenu}
                    className="w-full bg-red-50 text-red-600 border border-red-200 hover:bg-red-100 font-bold py-2 rounded-xl text-xs transition mt-2"
                  >
                    Reset Harga & Menu ke Bawaan
                  </button>
                </div>
              </div>
            )}
          </main>

          {}
          {/* MODAL CUSTOM ALERT / CONFIRM */}
          {customAlert.show && (
            <div className="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-4">
              <div className="bg-white w-full max-w-xs rounded-2xl p-4 space-y-3 shadow-2xl animate-fade-in">
                <h3 className="font-bold text-gray-800 text-sm border-b pb-1.5">{customAlert.title}</h3>
                <p className="text-xs text-gray-600 leading-relaxed">{customAlert.message}</p>
                <div className="flex justify-end space-x-2 pt-2">
                  {customAlert.type === "confirm" && (
                    <button
                      onClick={closeAlert}
                      className="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-xs font-semibold"
                    >
                      Batal
                    </button>
                  )}
                  <button
                    onClick={() => {
                      if (customAlert.onConfirm) customAlert.onConfirm();
                      closeAlert();
                    }}
                    className="px-4 py-1.5 bg-brand-blue hover:bg-brand-blueDark text-white rounded-lg text-xs font-bold"
                  >
                    {customAlert.type === "confirm" ? "Ya, Lanjutkan" : "OK"}
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* MODAL QUICK EDIT HARGA DI KERANJANG */}
          {editingCartItem && (
            <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
              <div className="bg-white w-full max-w-xs rounded-2xl p-4 space-y-3 shadow-2xl">
                <div className="flex justify-between items-center border-b pb-2">
                  <h3 className="font-bold text-gray-800 text-sm">Penyesuaian Harga Pesanan</h3>
                  <button onClick={() => setEditingCartItem(null)} className="text-gray-400 font-bold">✕</button>
                </div>

                <form onSubmit={handleSaveCartPrice} className="space-y-3 text-xs">
                  <div>
                    <label className="font-semibold text-gray-600 block mb-1">Item:</label>
                    <p className="font-bold text-gray-800 text-sm">{editingCartItem.name}</p>
                  </div>

                  <div>
                    <label className="font-bold text-gray-700 block mb-1">Harga Satuan Baru (Rp):</label>
                    <input
                      type="number"
                      required
                      value={editCartPrice}
                      onChange={(e) => setEditCartPrice(e.target.value)}
                      className="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-xl text-sm font-bold text-gray-800 focus:bg-white focus:ring-2 focus:ring-brand-blue focus:outline-none"
                    />
                  </div>

                  <div className="flex space-x-2 pt-2">
                    <button
                      type="button"
                      onClick={() => setEditingCartItem(null)}
                      className="w-1/2 bg-gray-100 text-gray-700 font-bold py-2 rounded-xl text-xs"
                    >
                      Batal
                    </button>
                    <button
                      type="submit"
                      className="w-1/2 bg-brand-blue text-white font-bold py-2 rounded-xl text-xs shadow-md"
                    >
                      Simpan
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* MODAL TAMBAH / EDIT MENU KATALOG */}
          {showAddMenuModal && (
            <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
              <div className="bg-white w-full max-w-xs rounded-2xl p-4 space-y-3 shadow-2xl">
                <div className="flex justify-between items-center border-b pb-2">
                  <h3 className="font-bold text-gray-800 text-sm">
                    {editingItemCatalog ? "Edit Harga & Menu" : "Tambah Menu Manual"}
                  </h3>
                  <button onClick={resetMenuForm} className="text-gray-400 font-bold text-lg">✕</button>
                </div>

                <form onSubmit={handleSaveCatalogOrCustom} className="space-y-2.5 text-xs">
                  <div>
                    <label className="font-bold text-gray-700 block mb-1">Nama Menu / Item:</label>
                    <input
                      type="text"
                      required
                      placeholder="Contoh: Ayam Bakar / Es Teh Jumbo"
                      value={customName}
                      onChange={(e) => setCustomName(e.target.value)}
                      className="w-full p-2 bg-gray-50 border border-gray-300 rounded-lg text-xs focus:bg-white focus:ring-1 focus:ring-brand-blue focus:outline-none"
                    />
                  </div>

                  <div className="grid grid-cols-2 gap-2">
                    <div>
                      <label className="font-bold text-gray-700 block mb-1">Harga (Rp):</label>
                      <input
                        type="number"
                        required
                        placeholder="15000"
                        value={customPrice}
                        onChange={(e) => setCustomPrice(e.target.value)}
                        className="w-full p-2 bg-gray-50 border border-gray-300 rounded-lg text-xs font-bold text-gray-800 focus:bg-white focus:ring-1 focus:ring-brand-blue focus:outline-none"
                      />
                    </div>

                    {!editingItemCatalog && (
                      <div>
                        <label className="font-bold text-gray-700 block mb-1">Banyaknya (Qty):</label>
                        <input
                          type="number"
                          min="1"
                          required
                          value={customQty}
                          onChange={(e) => setCustomQty(e.target.value)}
                          className="w-full p-2 bg-gray-50 border border-gray-300 rounded-lg text-xs focus:bg-white focus:ring-1 focus:ring-brand-blue focus:outline-none"
                        />
                      </div>
                    )}
                  </div>

                  <div>
                    <label className="font-bold text-gray-700 block mb-1">Kategori:</label>
                    <select
                      value={customCategory}
                      onChange={(e) => setCustomCategory(e.target.value)}
                      className="w-full p-2 bg-gray-50 border border-gray-300 rounded-lg text-xs focus:bg-white focus:outline-none"
                    >
                      <option value="Ayam & Nasi">Ayam & Nasi</option>
                      <option value="Seblak">Seblak</option>
                      <option value="Minuman">Minuman</option>
                      <option value="Cemilan">Cemilan</option>
                    </select>
                  </div>

                  {!editingItemCatalog && (
                    <div className="flex items-center space-x-2 pt-1">
                      <input
                        type="checkbox"
                        id="saveCatalog"
                        checked={saveToCatalog}
                        onChange={(e) => setSaveToCatalog(e.target.checked)}
                        className="rounded border-gray-300 text-brand-blue"
                      />
                      <label htmlFor="saveCatalog" className="text-[11px] text-gray-600">
                        Simpan juga ke daftar menu kasir
                      </label>
                    </div>
                  )}

                  <button
                    type="submit"
                    className="w-full bg-brand-blue hover:bg-brand-blueDark text-white font-bold py-2.5 rounded-xl text-xs shadow-md transition"
                  >
                    {editingItemCatalog ? "Simpan Perubahan Harga" : "+ Masukkan ke Pesanan"}
                  </button>
                </form>
              </div>
            </div>
          )}

          {/* MODAL PEMBAYARAN */}
          {showPaymentModal && (
            <div className="fixed inset-0 bg-black/60 z-50 flex items-end justify-center sm:items-center p-0 sm:p-4">
              <div className="bg-white w-full max-w-md rounded-t-2xl sm:rounded-2xl p-4 space-y-3 max-h-[90vh] overflow-y-auto">
                <div className="flex justify-between items-center border-b pb-2">
                  <h3 className="font-bold text-gray-800 text-sm">Pembayaran iZZi Corner</h3>
                  <button onClick={() => setShowPaymentModal(false)} className="text-gray-400 font-bold">✕</button>
                </div>

                <div className="bg-yellow-50 p-2.5 rounded-xl border border-yellow-200 text-center">
                  <p className="text-[11px] text-gray-600">Total Tagihan Pesanan</p>
                  <p className="text-xl font-black text-brand-blue">Rp {cartTotal.toLocaleString('id-ID')}</p>
                </div>

                <div className="space-y-1">
                  <label className="text-xs font-bold text-gray-700">Metode Pembayaran:</label>
                  <div className="grid grid-cols-3 gap-1.5">
                    {["Tunai", "QRIS", "GrabFood", "GoFood", "ShopeeFood"].map(m => (
                      <button
                        key={m}
                        onClick={() => {
                          if (soundEnabled) playSound('click');
                          setPaymentMethod(m);
                        }}
                        className={`py-1.5 px-1 text-xs font-bold rounded-lg border transition ${
                          paymentMethod === m 
                            ? 'bg-brand-blue text-white border-brand-blue' 
                            : 'bg-gray-50 text-gray-700 border-gray-200 hover:bg-gray-100'
                        }`}
                      >
                        {m}
                      </button>
                    ))}
                  </div>
                </div>

                {paymentMethod === "Tunai" && (
                  <div className="space-y-2">
                    <label className="text-xs font-bold text-gray-700">Uang Diterima (Rp):</label>
                    <input
                      type="number"
                      value={cashPaid}
                      onChange={(e) => setCashPaid(e.target.value)}
                      className="w-full p-2 bg-gray-50 rounded-xl border border-gray-300 font-bold text-base text-gray-800 focus:bg-white focus:outline-none focus:ring-2 focus:ring-brand-blue"
                    />

                    <div className="flex flex-wrap gap-1 pt-1">
                      {[cartTotal, 10000, 20000, 50000, 100000].map(amt => (
                        <button
                          key={amt}
                          onClick={() => {
                            if (soundEnabled) playSound('click');
                            setCashPaid(amt.toString());
                          }}
                          className="px-2 py-1 bg-gray-100 hover:bg-gray-200 border text-gray-800 font-bold text-xs rounded-lg"
                        >
                          {amt === cartTotal ? "Uang Pas" : `Rp ${(amt/1000)}rb`}
                        </button>
                      ))}
                    </div>

                    {parseFloat(cashPaid) >= cartTotal && (
                      <div className="bg-emerald-50 border border-emerald-200 p-2 rounded-xl flex justify-between items-center text-xs">
                        <span className="font-bold text-emerald-800">Kembalian:</span>
                        <span className="font-black text-emerald-700 text-sm">
                          Rp {(parseFloat(cashPaid) - cartTotal).toLocaleString('id-ID')}
                        </span>
                      </div>
                    )}
                  </div>
                )}

                <button
                  onClick={processPayment}
                  className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-xl shadow-lg transition text-xs"
                >
                  Selesaikan Transaksi
                </button>
              </div>
            </div>
          )}

          {}
          {/* MODAL STRUK SUKSES & OPSIONAL CETAK STRUK DENGAN LOGO */}
          {showReceiptModal && currentTransaction && (
            <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-3">
              <div className="bg-white w-full max-w-md rounded-2xl p-4 space-y-3 max-h-[92vh] overflow-y-auto shadow-2xl">
                
                <div className="text-center space-y-0.5">
                  <div className="w-10 h-10 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto font-black text-xl">
                    ✓
                  </div>
                  <h3 className="font-extrabold text-gray-800 text-base">Pembayaran Berhasil!</h3>
                  <p className="text-[11px] text-gray-500">Kode: {currentTransaction.id}</p>
                </div>

                {/* PRATINJAU STRUK DENGAN LOGO */}
                <div 
                  id="printable-receipt"
                  className="bg-yellow-50/50 border border-dashed border-gray-300 p-3 rounded-xl receipt-font text-xs space-y-1.5 text-gray-800 shadow-inner"
                >
                  <div className="text-center border-b border-dashed border-gray-400 pb-2 flex flex-col items-center">
                    {/* LOGO DI STRUK */}
                    <div className="mb-1.5">
                      <BrandLogo className="w-14 h-14 rounded-full border-2 border-yellow-400" />
                    </div>

                    <p className="font-bold text-xs">{STORE_INFO.name.toUpperCase()}</p>
                    <p className="text-[10px]">{STORE_INFO.slogan}</p>
                    <p className="text-[9px] text-gray-600">{STORE_INFO.address}</p>
                    <p className="text-[9px] text-gray-600">WA: {STORE_INFO.whatsapp}</p>
                  </div>

                  <div className="text-[10px] border-b border-dashed border-gray-400 pb-1">
                    <p>No : {currentTransaction.id}</p>
                    <p>Tgl: {currentTransaction.date}</p>
                    <p>Bayar: {currentTransaction.paymentMethod}</p>
                  </div>

                  <div className="space-y-1 text-[10px] border-b border-dashed border-gray-400 pb-2">
                    {currentTransaction.items.map((it, idx) => (
                      <div key={idx}>
                        <p className="font-bold">{it.name}</p>
                        {it.note && <p className="text-[9px] text-gray-500 pl-2">* {it.note}</p>}
                        <div className="flex justify-between text-[9px]">
                          <span>{it.qty} x {it.price.toLocaleString('id-ID')}</span>
                          <span>Rp {(it.qty * it.price).toLocaleString('id-ID')}</span>
                        </div>
                      </div>
                    ))}
                  </div>

                  <div className="space-y-0.5 text-[10px] font-bold border-b border-dashed border-gray-400 pb-2">
                    {currentTransaction.deliveryFee > 0 ? (
                      <>
                        <div className="flex justify-between text-[9px] font-normal">
                          <span>Subtotal Item:</span>
                          <span>Rp {(currentTransaction.itemsSubtotal || currentTransaction.total - currentTransaction.deliveryFee).toLocaleString('id-ID')}</span>
                        </div>
                        <div className="flex justify-between text-[9px] text-emerald-700">
                          <span>Ongkir Delivery Unit:</span>
                          <span>Rp {currentTransaction.deliveryFee.toLocaleString('id-ID')}</span>
                        </div>
                      </>
                    ) : (
                      <div className="flex justify-between text-[9px] font-normal text-gray-600">
                        <span>Ongkir:</span>
                        <span>GRATIS (Loby/Sec)</span>
                      </div>
                    )}

                    <div className="flex justify-between font-extrabold pt-0.5">
                      <span>Total:</span>
                      <span>Rp {currentTransaction.total.toLocaleString('id-ID')}</span>
                    </div>

                    {currentTransaction.paymentMethod === "Tunai" && (
                      <>
                        <div className="flex justify-between text-[9px] font-normal">
                          <span>Tunai:</span>
                          <span>Rp {currentTransaction.paid.toLocaleString('id-ID')}</span>
                        </div>
                        <div className="flex justify-between text-[9px] font-normal">
                          <span>Kembali:</span>
                          <span>Rp {currentTransaction.change.toLocaleString('id-ID')}</span>
                        </div>
                      </>
                    )}
                  </div>

                  <div className="text-center text-[9px] text-gray-600 pt-0.5">
                    <p className="font-bold">Terima Kasih!</p>
                    <p>Fresh & Delicious Everyday</p>
                  </div>
                </div>

                {/* TOMBOL AKSI CETAK */}
                <div className="space-y-1.5 pt-1">
                  <button
                    onClick={() => printReceiptThermal(currentTransaction)}
                    className="w-full bg-brand-blue hover:bg-brand-blueDark text-white font-bold py-2 rounded-xl text-xs flex items-center justify-center space-x-2 shadow transition"
                  >
                    <span>🖨️ Cetak Struk + Logo Thermal (58mm)</span>
                  </button>

                  <button
                    onClick={() => sendWhatsAppReceipt(currentTransaction)}
                    className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 rounded-xl text-xs flex items-center justify-center space-x-2 shadow transition"
                  >
                    <span>💬 Kirim Struk via WhatsApp</span>
                  </button>

                  <button
                    onClick={() => setShowReceiptModal(false)}
                    className="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 rounded-xl text-xs transition"
                  >
                    ⚡ Transaksi Baru (Selesai Tanpa Cetak)
                  </button>
                </div>

              </div>
            </div>
          )}

          {/* BOTTOM NAVIGATION */}
          <nav className="absolute bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around py-2 px-1 shadow-lg z-10">
            <button
              onClick={() => {
                if (soundEnabled) playSound('click');
                setActiveTab('kasir');
              }}
              className={`flex flex-col items-center flex-1 py-0.5 ${activeTab === 'kasir' ? 'text-brand-blue font-bold' : 'text-gray-400'}`}
            >
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 100 4 2 2 0 000-4z"/>
              </svg>
              <span className="text-[10px] mt-0.5">Kasir</span>
            </button>

            <button
              onClick={() => {
                if (soundEnabled) playSound('click');
                setActiveTab('riwayat');
              }}
              className={`flex flex-col items-center flex-1 py-0.5 ${activeTab === 'riwayat' ? 'text-brand-blue font-bold' : 'text-gray-400'}`}
            >
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
              </svg>
              <span className="text-[10px] mt-0.5">Riwayat</span>
            </button>

            <button
              onClick={() => {
                if (soundEnabled) playSound('click');
                setActiveTab('analisis');
              }}
              className={`flex flex-col items-center flex-1 py-0.5 ${activeTab === 'analisis' ? 'text-brand-blue font-bold' : 'text-gray-400'}`}
            >
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 002 2h2a2 2 0 002-2z"/>
              </svg>
              <span className="text-[10px] mt-0.5">Laporan</span>
            </button>

            <button
              onClick={() => {
                if (soundEnabled) playSound('click');
                setActiveTab('pengaturan');
              }}
              className={`flex flex-col items-center flex-1 py-0.5 ${activeTab === 'pengaturan' ? 'text-brand-blue font-bold' : 'text-gray-400'}`}
            >
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
              </svg>
              <span className="text-[10px] mt-0.5">Pengaturan</span>
            </button>
          </nav>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
